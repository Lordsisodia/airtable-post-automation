name: Daily IG Scrape

on:
  schedule:
    # Run at 17:00 UTC = 9am AEDT (Sydney). Adjust to your timezone.
    # 17:00 UTC covers most US timezones mid-morning and Europe afternoon.
    - cron: "0 17 * * *"
  workflow_dispatch:   # manual trigger at github.com/actions

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r instagram-tracker/requirements.txt

      - name: Run scrape
        env:
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
          APIFY_TOKEN:  ${{ secrets.APIFY_TOKEN }}
        run: |
          cd instagram-tracker
          python scrape.py

      - name: Compute benchmark scores
        env:
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
          APIFY_TOKEN:  ${{ secrets.APIFY_TOKEN }}
        run: |
          cd airtable-reels/scripts
          python3 compute_medians.py
          python3 compute_benchmark.py --execute

      # NOTE: OPEN REEL / OPEN PIC are computed Airtable button fields.
      # They cannot accept API writes. To enable them:
      # 1. In Airtable UI, open each button field → Customize → "Link to URL field"
      # 2. Point it at the POST URL field. Once configured, the buttons will
      #    automatically open the right URL — no script needed.
      # Run this manually to populate them once configured:
      # cd airtable-reels/scripts && python3 wire_buttons.py --execute
