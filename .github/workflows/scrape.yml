name: Daily IG Scrape

on:
  workflow_dispatch:   # manual trigger only at github.com/actions

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Run scrape
        env:
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
          APIFY_TOKEN:  ${{ secrets.APIFY_TOKEN }}
        run: |
          cd instagram-tracker
          python scrape.py

      - name: Compute benchmark scores
        env:
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
        run: |
          cd airtable-reels/scripts
          python3 compute_medians.py
          python3 compute_benchmark.py --execute
