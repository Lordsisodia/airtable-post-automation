name: Verify DB

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests

      - name: Run verification
        env:
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
        run: python3 verify-db.py
